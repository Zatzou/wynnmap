[build]
public_url = "./"
minify = "on_release"

[watch]
ignore = ["wynnmap-server", "wynnmap.css", "icons.ase"]

[serve]
addresses = ["0.0.0.0"]

[[hooks]]
stage = "pre_build"
command = "npx"
command_arguments = [
    "@tailwindcss/cli",
    "-i",
    "./resources/style.css",
    "-o",
    "./wynnmap.css",
]

[[proxy]]
backend = "https://wynnmap.zatzou.com/api/"
# backend = "http://localhost:8081/api/"

[[proxy]]
backend = "wss://wynnmap.zatzou.com/api/v3/terr/state/ws"
# backend = "ws://localhost:8081/api/v3/terr/state/ws"
ws = true
