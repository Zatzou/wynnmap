[build]
public_url = "./"
minify = "on_release"

[serve]
addresses = ["0.0.0.0"]

[[hooks]]
stage = "pre_build"
command = "npx"
command_arguments = [
    "@tailwindcss/cli",
    "-i",
    "./resources/style.css",
    "-o",
    "./wynnmap.css",
]

[[proxy]]
backend = "https://wynnmap.zatzou.com/api/"
# backend = "http://localhost:8081/api/"

[watch]
ignore = ["icons.ase"]